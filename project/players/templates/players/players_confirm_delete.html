{% extends "players/base.html" %}

{% block title %}플레이어 삭제{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="card shadow-sm border-0">
            <div class="card-body p-4">
                <h1 class="h3 text-danger mb-3">플레이어 삭제</h1>
                <p class="mb-4">
                    정말로 <strong>{{ object.player_id }}</strong> 플레이어를 삭제하시겠습니까?
                </p>

                <form method="post">
                    {% csrf_token %}
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-danger">삭제</button>
                        <a href="{% url 'players:player_list' %}" class="btn btn-outline-secondary">취소</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
